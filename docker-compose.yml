version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:5.0
    container_name: guardianbyte-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: guardianbyte
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - guardianbyte-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guardianbyte-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password@mongodb:27017/guardianbyte?authSource=admin
      JWT_SECRET: your_production_jwt_secret_here
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      ML_SERVICE_URL: http://ml-service:5000
      PORT: 5001
    depends_on:
      - mongodb
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - guardianbyte-network

  # ML Service
  ml-service:
    build:
      context: ./backend-ml
      dockerfile: Dockerfile
    container_name: guardianbyte-ml-service
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
    volumes:
      - ./backend-ml/models:/app/models
    networks:
      - guardianbyte-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: guardianbyte-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost:5001/api
      REACT_APP_ML_URL: http://localhost:5000
    depends_on:
      - backend
      - ml-service
    networks:
      - guardianbyte-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: guardianbyte-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - guardianbyte-network

volumes:
  mongodb_data:
    driver: local

networks:
  guardianbyte-network:
    driver: bridge
